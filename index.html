// SHA-256 Hash des Passworts – kein Klartext im Code
const ADMIN_PW_HASH = "1359294955c5b23df8628ab0b96a3ac8fdef1f85a71c2116de2a7f14d751359e";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

const TYPES = {
  uebung:      "Übungsdienst",
  versammlung: "Dienstversammlung",
  osisau:      "OSiSau",
  jfw:         "JFW",
  kifeu:       "Kifeu",
  sonstiges:   "Sonstiges",
};

const TYPE_META = {
  uebung:      { color: "#1355A8", bg: "#EFF4FF", label: "Übungsdienst" },
  versammlung: { color: "#6B21A8", bg: "#F5F0FF", label: "Dienstversammlung" },
  osisau:      { color: "#166534", bg: "#ECFDF5", label: "OSiSau" },
  jfw:         { color: "#B45309", bg: "#FFFBEB", label: "JFW" },
  kifeu:       { color: "#0E7490", bg: "#ECFEFF", label: "Kifeu" },
  sonstiges:   { color: "#57534E", bg: "#F5F5F4", label: "Sonstiges" },
};

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function lastName(name) { const p = name.trim().split(" "); return p[p.length - 1]; }
function displayName(name) { const p = name.trim().split(" "); if (p.length < 2) return name; const last = p[p.length - 1]; const first = p.slice(0, -1).join(" "); return `${last}, ${first}`; }
function formatDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  return `${day}.${m}.${y}`;
}
function formatDateShort(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  const months = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  return `${parseInt(day)}. ${months[parseInt(m)-1]}`;
}

const defaultData = { members: [], events: [], missions: [] };

function loadData() {
  // Start with embedded data as initial state, Firebase will override
  try {
    const tag = document.getElementById("fw-data");
    if (tag) {
      const parsed = JSON.parse(tag.textContent);
      if (parsed && parsed.members) return parsed;
    }
  } catch {}
  return defaultData;
}

function saveData(data) {
  // Save to localStorage as quick local cache
  try { localStorage.setItem("fw_dienstbuch", JSON.stringify(data)); } catch {}
  // Save to Firebase only if initial load is complete
  if (window._fbSyncReady && window._fbDocRef && window._fbSetDoc) {
    window._fbSetDoc(window._fbDocRef, { payload: JSON.stringify(data) })
      .catch(err => console.error("Firebase save error:", err));
  }
}

async function saveToFile(data) {
  let source;
  try {
    const resp = await fetch(location.href);
    source = await resp.text();
  } catch {
    source = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  }

  // Inhalt des fw-data Script-Tags ersetzen
  const jsonStr = JSON.stringify(data);
  const updated = source.replace(
    /(<script id="fw-data" type="application\/json">)([\s\S]*?)(<\/script>)/,
    "$1" + jsonStr + "$3"
  );

  const blob = new Blob([updated], { type: "text/html;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Dienstbuch.html";
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportEventToExcel(ev, members) {
  const responsible = ev.responsible ? members.find(m => m.id === ev.responsible) : null;
  const typeLabels = {
    uebung: "Übungsdienst", versammlung: "Dienstversammlung", osisau: "OSiSau",
    jfw: "JFW", kifeu: "KiFeu", sonstiges: "Sonstiges",
  };

  const infoRows = [
    ["Bezeichnung", ev.title],
    ["Datum", formatDate(ev.date)],
    ["Art", typeLabels[ev.type] || ev.type],
    ["Zeit", ev.timeFrom && ev.timeTo ? `${ev.timeFrom}–${ev.timeTo} (${ev.hours}h)` : ""],
    ["Verantwortlicher", responsible ? displayName(responsible.name) : "—"],
    ["Teilnehmer", ev.attendees.length],
    [],
    ["#", "Name", "Anwesend"],
  ];

  const sorted = [...members].sort((a, b) => lastName(a.name).localeCompare(lastName(b.name), "de"));
  sorted.forEach((m, i) => {
    infoRows.push([i + 1, displayName(m.name), ev.attendees.includes(m.id) ? "✓" : ""]);
  });

  const ws = XLSX.utils.aoa_to_sheet(infoRows);
  ws["!cols"] = [{wch:4},{wch:26},{wch:12}];

  const wb = XLSX.utils.book_new();
  const sheetName = ev.title.slice(0, 28).replace(/[\\/*?[\]:]/g, "");
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, `Dienst_${formatDate(ev.date)}_${sheetName}.xlsx`);
}

function exportToExcel(stats, year) {
  const rows = [
    ["#", "Name", "Übungen (Anz.)", "Übungen (Std.)", "Versammlungen (Anz.)", "Versammlungen (Std.)", "OSiSau (Anz.)", "OSiSau (Std.)", "JFW (Anz.)", "JFW (Std.)", "Kifeu (Anz.)", "Kifeu (Std.)", "Sonstiges (Anz.)", "Sonstiges (Std.)", "Gesamt", "Gesamtstunden"]
  ];
  stats.forEach((m, i) => {
    rows.push([
      i + 1, m.name,
      m.uebungen, parseFloat(m.uebungenH.toFixed(1)),
      m.versammlungen, parseFloat(m.versammlungenH.toFixed(1)),
      m.osisau, parseFloat(m.osisauH.toFixed(1)),
      m.jfw, parseFloat(m.jfwH.toFixed(1)),
      m.kifeu, parseFloat(m.kifeuH.toFixed(1)),
      m.sonstiges, parseFloat(m.sonstigesH.toFixed(1)),
      m.total, parseFloat(m.hours.toFixed(1))
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Spaltenbreiten
  ws["!cols"] = [
    {wch:4},{wch:22},{wch:14},{wch:13},{wch:18},{wch:18},{wch:13},{wch:13},{wch:11},{wch:11},{wch:13},{wch:13},{wch:16},{wch:16},{wch:9},{wch:14}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `Auswertung ${year}`);
  XLSX.writeFile(wb, `Dienstbuch_Auswertung_${year}.xlsx`);
}

    let unsub = null;
    const setup = () => {
      if (!window._fbOnSnapshot || !window._fbDocRef) return;
      unsub = window._fbOnSnapshot(window._fbDocRef, (snap) => {
        if (snap.exists()) {

            const parsed = JSON.parse(snap.data().payload);

        }
      }, () => {
        window._fbSyncReady = true;
        setFbLoading(false);
      });
    };
    if (window._fbReady) {
      setup();
    } else {
      window.addEventListener("firebase-ready", setup, { once: true });
      setTimeout(() => { window._fbSyncReady = true; setFbLoading(false); }, 4000);
    }
    return () => { if (unsub) unsub(); };
  }, []);

  function sendEventMail(ev, members) {
    const responsible = ev.responsible ? members.find(m => m.id === ev.responsible) : null;
    const attendeeNames = [...members]
      .filter(m => ev.attendees.includes(m.id))
      .sort((a, b) => lastName(a.name).localeCompare(lastName(b.name), "de"))
      .map((m, i) => `${i + 1}. ${displayName(m.name)}`)
      .join("\n");

    const params = {
      title:       ev.title,
      date:        formatDate(ev.date),
      type:        TYPE_LABELS[ev.type] || ev.type,
      time:        ev.timeFrom && ev.timeTo ? `${ev.timeFrom}–${ev.timeTo} (${ev.hours}h)` : "—",
      responsible: responsible ? displayName(responsible.name) : "—",
      count:       String(ev.attendees.length),
      attendees:   attendeeNames || "Keine Teilnehmer",
      to_email:    MAIL_RECIPIENTS[0],
      to_email2:   MAIL_RECIPIENTS[1],
      reply_to:    MAIL_RECIPIENTS[0],
    };

    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, params)
      .then(() => showToast("✅ Mail erfolgreich versendet!", true))
      .catch(err => {
        console.error("EmailJS Fehler:", err);
        showToast("❌ Fehler beim Versenden: " + (err?.text || err), false);
      });
  }

  function sendMissionMail(ms, members) {
    const commander = ms.commander ? members.find(m => m.id === ms.commander) : null;
    // Build vehicle assignments text
    const vehicleLines = (ms.vehicles || []).map(v => {
      const entries = Object.entries((ms.assignments || {})[v] || {});
      if (entries.length === 0) return `${v}: —`;
      const crew = entries.map(([mid, role]) => {
        const m = members.find(x => x.id === mid);
        return m ? `  ${role}: ${displayName(m.name)}` : null;
      }).filter(Boolean).join("\n");
      return `${v}:\n${crew}`;
    }).join("\n\n");
    // Reserve
    const assignedIds = new Set((ms.vehicles || []).flatMap(v => Object.keys((ms.assignments || {})[v] || {})));
    const reserveNames = (ms.attendees || [])
      .filter(id => !assignedIds.has(id))
      .map(id => { const m = members.find(x => x.id === id); return m ? displayName(m.name) : null; })
      .filter(Boolean).join(", ");

    const params = {
      title:       `Einsatz: ${ms.title}${ms.number ? " (#" + ms.number + ")" : ""}`,
      date:        formatDate(ms.date),
      type:        "Einsatz",
      time:        ms.timeFrom && ms.timeTo ? `${ms.timeFrom}–${ms.timeTo} (${ms.hours}h)` : "—",
      responsible: commander ? displayName(commander.name) : "—",
      count:       String((ms.attendees || []).length),
      attendees:   (vehicleLines || "Keine Besatzung") + (reserveNames ? `\n\nReserve: ${reserveNames}` : "") + (ms.report ? `\n\nKurzbericht:\n${ms.report}` : ""),
      to_email:    MAIL_RECIPIENTS[0],
      to_email2:   MAIL_RECIPIENTS[1],
      reply_to:    MAIL_RECIPIENTS[0],
    };
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, params)
      .then(() => showToast("✅ Einsatz-Mail versendet!", true))
      .catch(err => {
        console.error("EmailJS Fehler:", err);
        showToast("❌ Fehler beim Versenden: " + (err?.text || err), false);
      });
  }

  function addEvent() {
    if (!form.date || !form.title || !form.timeFrom || !form.timeTo) return;
    const [fh, fm] = form.timeFrom.split(":").map(Number);
    const [th, tm] = form.timeTo.split(":").map(Number);
    let hours = ((th * 60 + tm) - (fh * 60 + fm)) / 60;
    if (hours <= 0) hours += 24;
    hours = Math.round(hours * 100) / 100;
    const ev = {
      id: generateId(), date: form.date, title: form.title,
      type: form.type || "uebung", hours, timeFrom: form.timeFrom, timeTo: form.timeTo,
      attendees: form.attendees || [], createdAt: Date.now(), responsible: form.responsible || null, guests: form.guests || ""
    };
    setData(d => ({ ...d, events: [...d.events, ev].sort((a, b) => b.date.localeCompare(a.date)) }));

    // Auto-Mail nach 3 Stunden
    setTimeout(() => {
      setData(currentData => {
        const latestEv = currentData.events.find(e => e.id === ev.id);
        if (latestEv) sendEventMail(latestEv, currentData.members);
        return currentData;
      });
    }, 3 * 60 * 60 * 1000);

    setModal(null); setForm({});
  }

  function getStats(year) {
    const evs = data.events.filter(e => new Date(e.date).getFullYear() === year);

      .sort((a, b) => lastName(a.name).localeCompare(lastName(b.name), "de"))

          color: view === "events" ? "#fff" : "var(--muted)",

        }}>📅 Termine</button>

          padding: "9px 18px", borderRadius: 9, cursor: "pointer",
          fontWeight: 600, fontSize: 14, fontFamily: "var(--font-body)",
          border: view === "missions" ? "none" : "1px solid var(--border)",
          background: view === "missions" ? "var(--red)" : "var(--surface)",
          color: view === "missions" ? "#fff" : "var(--muted)",
          transition: "all 0.15s", display: "flex", alignItems: "center", gap: 6,

        }}>🚒 Einsätze</button>

          <button onClick={() => setView("members")} style={{
            padding: "9px 18px", borderRadius: 9, cursor: "pointer",
            fontWeight: 600, fontSize: 14, fontFamily: "var(--font-body)",
            border: view === "members" ? "none" : "1px solid var(--border)",
            background: view === "members" ? "var(--text)" : "var(--surface)",
            color: view === "members" ? "#fff" : "var(--muted)",
            transition: "all 0.15s", display: "flex", alignItems: "center", gap: 6,
            boxShadow: view === "members" ? "0 2px 8px rgba(0,0,0,0.2)" : "none",
          }}>👥 Mitglieder</button>
          <button onClick={() => setView("stats")} style={{
            padding: "9px 18px", borderRadius: 9, cursor: "pointer",
            fontWeight: 600, fontSize: 14, fontFamily: "var(--font-body)",
            border: view === "stats" ? "none" : "1px solid var(--border)",
            background: view === "stats" ? "var(--text)" : "var(--surface)",
            color: view === "stats" ? "#fff" : "var(--muted)",
            transition: "all 0.15s", display: "flex", alignItems: "center", gap: 6,

            <button onClick={() => { setModal({ type: "event" }); setForm({ type: "uebung" }); }} style={S.btnPrimary}>
              + Eintrag
            </button>
          </div>

          {filteredEvents.length === 0 && <div style={S.empty}>Noch keine Termine für {filterYear}.</div>}

          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {filteredEvents.map(ev => {
              const meta = TYPE_META[ev.type];
              const pct = data.members.length > 0 ? (ev.attendees.length / data.members.length) * 100 : 0;
              return (
                <div key={ev.id} style={{
                  background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10,
                  padding: "14px 16px", boxShadow: "var(--shadow)",
                  display: "grid", gridTemplateColumns: "1fr auto", gap: "8px 16px", alignItems: "center",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4, minWidth: 0 }}>
                      {/* Type badge */}
                      <span style={{
                        background: meta.bg, color: meta.color,
                        borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 700,
                        letterSpacing: "0.03em", whiteSpace: "nowrap", alignSelf: "flex-start",
                      }}>{meta.label}</span>

                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{ev.title}</div>
                        <div style={{ color: "var(--muted)", fontSize: 12, marginTop: 2, display: "flex", gap: 10, flexWrap: "wrap" }}>

                          {ev.responsible && (() => {
                            const m = data.members.find(m => m.id === ev.responsible);
                            return m ? <span>👤 {m.name}</span> : null;
                          })()}
                        </div>
                      </div>
                    </div>

                    {/* Attendance bar */}
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: 8, flexShrink: 0 }}>
                      <div style={{ width: 80, height: 6, background: "#E8E5E0", borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: `${pct}%`, height: "100%", background: pct >= 70 ? "#16A34A" : pct >= 40 ? "#D97706" : "var(--red)", borderRadius: 3, transition: "width 0.3s" }} />
                      </div>
                      <span style={{ fontSize: 12, color: "var(--muted)", whiteSpace: "nowrap" }}>
                        {ev.attendees.length}/{data.members.length}
                      </span>
                    </div>
                  </div>

                  <div style={{ display: "flex", gap: 6, justifyContent: "flex-end" }}>

                      setModal({ type: "event", editMode: true, eventId: ev.id });
                      setForm({

                        timeFrom: ev.timeFrom, timeTo: ev.timeTo,
                        responsible: ev.responsible || "",
                        guests: ev.guests || "",
                        attendees: ev.attendees || [],

                  background: "var(--surface)", border: "1.5px solid #FCA5A5", borderRadius: 10,

                  <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>

                      background: "#FEF2F2", color: "var(--red)",
                      borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 700,
                      letterSpacing: "0.03em", whiteSpace: "nowrap",

                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>

                      <div style={{ color: "var(--muted)", fontSize: 12, marginTop: 2, display: "flex", gap: 10, flexWrap: "wrap" }}>
                        <span>📅 {formatDate(ms.date)}</span>

                        {ms.location && <span>📍 {ms.location}</span>}
                        {commander && <span>👤 {displayName(commander.name)}</span>}

                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: 8 }}>
                      <div style={{ width: 80, height: 6, background: "#E8E5E0", borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: `${pct}%`, height: "100%", background: "var(--red)", borderRadius: 3 }} />
                      </div>
                      <span style={{ fontSize: 12, color: "var(--muted)", whiteSpace: "nowrap" }}>
                        {ms.attendees.length}/{data.members.length}

                  <div style={{ display: "flex", gap: 6, justifyContent: "flex-end" }}>
                    <button onClick={() => setModal({ type: "missionAttendance", missionId: ms.id })} style={S.btnSmallBlue}>

                    {isAdmin && <button onClick={() => deleteMission(ms.id)} style={S.btnSmallRed}>🗑</button>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Mitglieder ── */}
      {view === "members" && <div className="fade-in">{(() => {
        const activeMembers = sortedMembers.filter(m => (m.group || "aktiv") === "aktiv");
        const altersMembers = sortedMembers.filter(m => m.group === "alters");
        const displayList = memberTab === "aktiv" ? activeMembers : altersMembers;
        return <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontFamily: "var(--font-head)", fontSize: 20, fontWeight: 700, letterSpacing: "0.02em" }}>
              MITGLIEDER
              <span style={{ fontFamily: "var(--font-body)", fontSize: 13, fontWeight: 500, color: "var(--muted)", marginLeft: 8 }}>
                {data.members.length} Personen
              </span>
            </div>
            {isAdmin && (
              <button onClick={() => { setModal({ type: "member" }); setForm({ group: memberTab }); }} style={S.btnPrimary}>
                + Mitglied
              </button>
            )}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
            {[["aktiv", `🚒 Aktive Abteilung (${activeMembers.length})`], ["alters", `🎖 Altersabteilung (${altersMembers.length})`]].map(([tab, label]) => (
              <button key={tab} onClick={() => setMemberTab(tab)} style={{
                padding: "7px 16px", borderRadius: 8, cursor: "pointer", fontWeight: 600, fontSize: 13,
                border: memberTab === tab ? "none" : "1px solid var(--border)",
                background: memberTab === tab ? (tab === "alters" ? "#78350F" : "var(--text)") : "var(--surface)",

              const isAlters = m.group === "alters";
              return (
                <div key={m.id} style={{
                  background: "var(--surface)", border: `1px solid ${isAlters ? "#D97706" : "var(--border)"}`,
                  borderRadius: 10, padding: "14px 16px", boxShadow: "var(--shadow)", display: "flex", alignItems: "center", gap: 12,
                }}>
                  <div style={{
                    width: 40, height: 40, borderRadius: 10,
                    background: isAlters ? "#FEF3C7" : "var(--red-light)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontFamily: "var(--font-head)", fontWeight: 800, fontSize: 16,
                    color: isAlters ? "#92400E" : "var(--red)", flexShrink: 0,

                    <div style={{ display: "flex", gap: 4 }}>
                      <button

                        style={{ ...S.btnSmall, padding: "4px 8px", fontSize: 11, background: isAlters ? "#EFF4FF" : "#FEF3C7", color: isAlters ? "#1355A8" : "#92400E", border: `1px solid ${isAlters ? "#BFCFEF" : "#FDE68A"}` }}>
                        {isAlters ? "🚒" : "🎖"}
                      </button>
                      <button onClick={() => deleteMember(m.id)} style={{ ...S.btnSmallRed, padding: "4px 8px" }}>🗑</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>;
      })()}</div>}

      {/* ── Jahresauswertung ── */}
      {view === "stats" && isAdmin && (
        <div className="fade-in">
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontFamily: "var(--font-head)", fontSize: 20, fontWeight: 700, letterSpacing: "0.02em" }}>
              JAHRESAUSWERTUNG {filterYear}
            </div>
            {stats.length > 0 && (
              <button onClick={() => exportToExcel(stats, filterYear)} style={{
                ...S.btnSecondary, background: "#F0FFF4", color: "#166534",
                border: "1px solid #86EFAC", fontWeight: 600,
              }}>
                📥 Als Excel exportieren
              </button>
            )}
          </div>

          {stats.length === 0 && <div style={S.empty}>Keine Daten vorhanden.</div>}

          <div style={{ overflowX: "auto", borderRadius: 12, border: "1px solid var(--border)", boxShadow: "var(--shadow)" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", background: "var(--surface)", minWidth: 860 }}>
              <thead>
                <tr style={{ background: "var(--text)", color: "#fff" }}>
                  <th rowSpan={2} style={{ padding: "10px 14px", textAlign: "left", fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", whiteSpace: "nowrap", verticalAlign: "middle" }}>#</th>
                  <th rowSpan={2} style={{ padding: "10px 14px", textAlign: "left", fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", whiteSpace: "nowrap", verticalAlign: "middle" }}>Name</th>
                  {[
                    { label: "Übungen", color: "#1355A8" },
                    { label: "Versammlungen", color: "#6B21A8" },
                    { label: "OSiSau", color: "#166534" },
                    { label: "JFW", color: "#B45309" },
                    { label: "Kifeu", color: "#0E7490" },
                    { label: "Sonstiges", color: "#57534E" },
                  ].map(({ label, color }) => (
                    <th key={label} colSpan={2} style={{ padding: "10px 14px", textAlign: "center", fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", whiteSpace: "nowrap", borderLeft: "2px solid rgba(255,255,255,0.15)", color }}>
                      {label}
                    </th>
                  ))}
                  <th rowSpan={2} style={{ padding: "10px 14px", textAlign: "left", fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", whiteSpace: "nowrap", borderLeft: "2px solid rgba(255,255,255,0.15)", verticalAlign: "middle" }}>Gesamt</th>
                  <th rowSpan={2} style={{ padding: "10px 14px", textAlign: "left", fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", whiteSpace: "nowrap", verticalAlign: "middle" }}>Ges. Std.</th>
                </tr>
                <tr style={{ background: "#2a2724", color: "rgba(255,255,255,0.75)" }}>
                  {["Anz.", "Std.", "Anz.", "Std.", "Anz.", "Std.", "Anz.", "Std.", "Anz.", "Std.", "Anz.", "Std."].map((h, i) => (
                    <th key={i} style={{ padding: "6px 14px", fontSize: 11, fontWeight: 600, textAlign: "left", whiteSpace: "nowrap", borderLeft: i % 2 === 0 ? "2px solid rgba(255,255,255,0.1)" : undefined }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {stats.map((m, i) => (
                  <tr key={m.id} style={{ borderTop: "1px solid var(--border)", background: i % 2 ? "var(--bg)" : "var(--surface)" }}>
                    <td style={{ ...S.td, color: "var(--muted)", fontWeight: 500 }}>{i + 1}</td>
                    <td style={{ ...S.td, fontWeight: 600, whiteSpace: "nowrap" }}>{m.name}</td>
                    <td style={{ ...S.td, borderLeft: "2px solid var(--border)" }}>{m.uebungen}</td>
                    <td style={{ ...S.td, color: "#1355A8", fontWeight: 600 }}>{m.uebungenH.toFixed(1)}h</td>
                    <td style={{ ...S.td, borderLeft: "2px solid var(--border)" }}>{m.versammlungen}</td>
                    <td style={{ ...S.td, color: "#6B21A8", fontWeight: 600 }}>{m.versammlungenH.toFixed(1)}h</td>
                    <td style={{ ...S.td, borderLeft: "2px solid var(--border)" }}>{m.osisau}</td>
                    <td style={{ ...S.td, color: "#166534", fontWeight: 600 }}>{m.osisauH.toFixed(1)}h</td>
                    <td style={{ ...S.td, borderLeft: "2px solid var(--border)" }}>{m.jfw}</td>
                    <td style={{ ...S.td, color: "#B45309", fontWeight: 600 }}>{m.jfwH.toFixed(1)}h</td>
                    <td style={{ ...S.td, borderLeft: "2px solid var(--border)" }}>{m.kifeu}</td>
                    <td style={{ ...S.td, color: "#0E7490", fontWeight: 600 }}>{m.kifeuH.toFixed(1)}h</td>
                    <td style={{ ...S.td, borderLeft: "2px solid var(--border)" }}>{m.sonstiges}</td>
                    <td style={{ ...S.td, color: "#57534E", fontWeight: 600 }}>{m.sonstigesH.toFixed(1)}h</td>
                    <td style={{ ...S.td, fontWeight: 700, borderLeft: "2px solid var(--border)" }}>{m.total}</td>
                    <td style={{ ...S.td, fontWeight: 700, color: "var(--red)" }}>{m.hours.toFixed(1)}h</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}


      {!isAdmin && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 32 }}>
          <button onClick={() => setShowPwModal(true)} style={{
            padding: "7px 14px", borderRadius: 9, cursor: "pointer",
            fontWeight: 500, fontSize: 12, fontFamily: "var(--font-body)",
            border: "1px dashed var(--border)",
            background: "transparent", color: "var(--muted)",
            display: "flex", alignItems: "center", gap: 5,
          }}>🔒 Admin</button>
        </div>
      )}
      {isAdmin && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 32, gap: 8 }}>
          <button onClick={() => saveToFile(data)} style={{
            padding: "8px 18px", borderRadius: 9, cursor: "pointer",
            fontWeight: 600, fontSize: 13, fontFamily: "var(--font-body)",
            border: "none", background: "var(--red)", color: "#fff",
            display: "flex", alignItems: "center", gap: 6,
          }}>💾 Als Datei speichern</button>
          <button onClick={() => setIsAdmin(false)} style={{
            padding: "7px 14px", borderRadius: 9, cursor: "pointer",
            fontWeight: 500, fontSize: 12, fontFamily: "var(--font-body)",
            border: "1px dashed var(--border)",
            background: "transparent", color: "var(--muted)",
            display: "flex", alignItems: "center", gap: 5,
          }}>🔓 Admin-Modus beenden</button>
        </div>
      )}

      {/* ── Modal: Admin Login ── */}
      {showPwModal && (
        <Overlay onClose={() => { setShowPwModal(false); setPwInput(""); setPwError(false); }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>🔒</div>
            <div style={{ fontFamily: "var(--font-head)", fontSize: 22, fontWeight: 800, letterSpacing: "0.02em" }}>ADMIN-BEREICH</div>
            <div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>Bitte Passwort eingeben</div>
          </div>
          <label style={S.lbl}>Passwort</label>
          <input
            type="password" placeholder="••••••••••" value={pwInput}
            onChange={e => { setPwInput(e.target.value); setPwError(false); }}
            onKeyDown={e => e.key === "Enter" && handleAdminLogin()}
            style={{ ...S.inp, borderColor: pwError ? "var(--red)" : "var(--border)", marginBottom: 6 }}
          />
          {pwError && <div style={{ color: "var(--red)", fontSize: 13, marginBottom: 8, fontWeight: 500 }}>⚠ Falsches Passwort.</div>}
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={handleAdminLogin} disabled={pwLoading} style={{ ...S.btnPrimary, flex: 1, justifyContent: "center" }}>
              {pwLoading ? "…" : "Anmelden"}
            </button>
            <button onClick={() => { setShowPwModal(false); setPwInput(""); setPwError(false); }} style={{ ...S.btnSecondary, flex: 1, justifyContent: "center" }}>
              Abbrechen
            </button>
          </div>
        </Overlay>
      )}

      {/* ── Modal: Termin ── */}
      {modal?.type === "event" && (
        <Overlay onClose={() => setModal(null)} wide>
          <ModalTitle>{modal.editMode ? "Termin bearbeiten" : "Neuen Termin hinzufügen"}</ModalTitle>
          <label style={S.lbl}>Datum</label>
          <input type="date" value={form.date || ""} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} style={S.inp} />
          <label style={S.lbl}>Bezeichnung</label>
          <input placeholder="z.B. Monatsübung" value={form.title || ""} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} style={S.inp} />
          <label style={S.lbl}>Art</label>
          <select value={form.type || "uebung"} onChange={e => setForm(f => ({ ...f, type: e.target.value }))} style={S.inp}>
            <option value="uebung">Übungsdienst</option>
            <option value="versammlung">Dienstversammlung</option>
            <option value="osisau">OSiSau</option>
            <option value="jfw">JFW</option>
            <option value="kifeu">Kifeu</option>
            <option value="sonstiges">Sonstiges</option>
          </select>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <div>
              <label style={S.lbl}>Zeit von</label>
              <input type="time" value={form.timeFrom || ""} onChange={e => setForm(f => ({ ...f, timeFrom: e.target.value }))} style={S.inp} />
            </div>
            <div>
              <label style={S.lbl}>Zeit bis</label>
              <input type="time" value={form.timeTo || ""} onChange={e => setForm(f => ({ ...f, timeTo: e.target.value }))} style={S.inp} />
            </div>
          </div>
          <label style={S.lbl}>Verantwortlicher</label>
          <select value={form.responsible || ""} onChange={e => {
            const id = e.target.value;
            setForm(f => ({
              ...f,
              responsible: id,
              attendees: id && !(f.attendees || []).includes(id)
                ? [...(f.attendees || []), id]
                : (f.attendees || [])
            }));
          }} style={S.inp}>
            <option value="">— keine Angabe —</option>
            {[...data.members].sort((a, b) => lastName(a.name).localeCompare(lastName(b.name), "de")).map(m => (
              <option key={m.id} value={m.id}>{m.name}</option>
            ))}
          </select>
          <label style={S.lbl}>
            Teilnehmer
            <span style={{ fontWeight: 400, textTransform: "none", marginLeft: 6, color: "var(--muted)" }}>
              {(form.attendees || []).length} ausgewählt
            </span>
          </label>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 220, overflowY: "auto", paddingRight: 4, border: "1px solid var(--border)", borderRadius: 8, padding: 8 }}>
            {[...data.members].sort((a, b) => lastName(a.name).localeCompare(lastName(b.name), "de")).map(m => {
              const checked = (form.attendees || []).includes(m.id);
              return (
                <div key={m.id}
                  onClick={() => setForm(f => ({
                    ...f,
                    attendees: checked
                      ? (f.attendees || []).filter(id => id !== m.id)
                      : [...(f.attendees || []), m.id]
                  }))}
                  style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "7px 10px",
                    borderRadius: 7, cursor: "pointer", transition: "all 0.12s",
                    background: checked ? "#FFF0EF" : "transparent",
                    border: `1.5px solid ${checked ? "var(--red)" : "transparent"}`,
                  }}
                >
                  <div style={{
                    width: 18, height: 18, borderRadius: 5, flexShrink: 0,
                    border: `2px solid ${checked ? "var(--red)" : "#CCC"}`,
                    background: checked ? "var(--red)" : "#fff",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "#fff", fontSize: 11, transition: "all 0.12s",
                  }}>{checked && "✓"}</div>
                  <span style={{ fontSize: 13, fontWeight: checked ? 600 : 400 }}>{m.name}</span>
                </div>
              );
            })}
          </div>
          <label style={S.lbl}>Gäste <span style={{ fontWeight: 400, textTransform: "none", color: "var(--muted)" }}>(optional, Freitext)</span></label>
          <textarea
            placeholder="z.B. Max Mustermann, Stadt Musterstadt…"
            value={form.guests || ""}
            onChange={e => setForm(f => ({ ...f, guests: e.target.value }))}
            style={{ ...S.inp, minHeight: 60, resize: "vertical", fontFamily: "var(--font-body)", fontSize: 13 }}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 20 }}>
            <button onClick={modal.editMode ? editEvent : addEvent} style={{ ...S.btnPrimary, flex: 1, justifyContent: "center" }}>{modal.editMode ? "✏️ Änderungen speichern" : "Speichern"}</button>
            <button onClick={() => setModal(null)} style={{ ...S.btnSecondary, flex: 1, justifyContent: "center" }}>Abbrechen</button>
          </div>
        </Overlay>
      )}

      {/* ── Modal: Mitglied ── */}
      {modal?.type === "member" && (
        <Overlay onClose={() => setModal(null)}>
          <ModalTitle>Neues Mitglied</ModalTitle>
          <label style={S.lbl}>Name</label>
          <input placeholder="Vorname Nachname" value={form.name || ""} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} style={S.inp} />
          <label style={S.lbl}>Abteilung</label>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            {[["aktiv", "🚒 Aktive Abteilung"], ["alters", "🎖 Altersabteilung"]].map(([val, label]) => {
              const sel = (form.group || "aktiv") === val;
              return (
                <div key={val} onClick={() => setForm(f => ({ ...f, group: val }))} style={{
                  flex: 1, padding: "9px 12px", borderRadius: 8, cursor: "pointer", fontWeight: 600, fontSize: 13,
                  border: `2px solid ${sel ? "var(--red)" : "var(--border)"}`,
                  background: sel ? "#FFF0EF" : "var(--surface)", color: sel ? "var(--red)" : "var(--muted)",
                  textAlign: "center", transition: "all 0.15s",
                }}>{label}</div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <button onClick={addMember} style={{ ...S.btnPrimary, flex: 1, justifyContent: "center" }}>Speichern</button>
            <button onClick={() => setModal(null)} style={{ ...S.btnSecondary, flex: 1, justifyContent: "center" }}>Abbrechen</button>
          </div>
        </Overlay>
      )}

      {/* ── Modal: Einsatz (Schritt 1) – Grunddaten + Fahrzeuge ── */}
      {modal?.type === "mission" && !modal.step && (
        <Overlay onClose={() => setModal(null)} wide>
          <ModalTitle>Neuer Einsatz – Schritt 1/3</ModalTitle>
          <div style={{ color: "var(--muted)", fontSize: 13, marginBottom: 12 }}>Grunddaten & Fahrzeuge</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <div>
              <label style={S.lbl}>Datum</label>
              <input type="date" value={form.date || ""} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} style={S.inp} />
            </div>
            <div>
              <label style={S.lbl}>Einsatznummer</label>
              <input placeholder="z.B. 2024-042" value={form.number || ""} onChange={e => setForm(f => ({ ...f, number: e.target.value }))} style={S.inp} />
            </div>
          </div>
          <label style={S.lbl}>Einsatzart / Stichwort</label>
          <input placeholder="z.B. B2 – Zimmerbrand" value={form.keyword || ""} onChange={e => setForm(f => ({ ...f, keyword: e.target.value }))} style={S.inp} />
          <label style={S.lbl}>Einsatzort / Adresse</label>
          <input placeholder="z.B. Hauptstraße 12, Musterstadt" value={form.location || ""} onChange={e => setForm(f => ({ ...f, location: e.target.value }))} style={S.inp} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <div>
              <label style={S.lbl}>Zeit von</label>
              <input type="time" value={form.timeFrom || ""} onChange={e => setForm(f => ({ ...f, timeFrom: e.target.value }))} style={S.inp} />
            </div>
            <div>
              <label style={S.lbl}>Zeit bis</label>
              <input type="time" value={form.timeTo || ""} onChange={e => setForm(f => ({ ...f, timeTo: e.target.value }))} style={S.inp} />
            </div>
          </div>
          <label style={S.lbl}>Einsatzleiter</label>
          <select value={form.commander || ""} onChange={e => setForm(f => ({ ...f, commander: e.target.value }))} style={S.inp}>
            <option value="">— keine Angabe —</option>
            {activeOnlyMembers.map(m => (
              <option key={m.id} value={m.id}>{displayName(m.name)}</option>
            ))}
          </select>
          <label style={S.lbl}>Einsatzkurzbericht</label>
          <textarea
            placeholder="Kurze Beschreibung des Einsatzverlaufs…"
            value={form.report || ""}
            onChange={e => setForm(f => ({ ...f, report: e.target.value }))}
            style={{ ...S.inp, minHeight: 80, resize: "vertical", fontFamily: "var(--font-body)", fontSize: 13 }}
          />
          <label style={S.lbl}>Fahrzeuge im Einsatz</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {["HLF10", "TSF", "MTF"].map(v => {
              const sel = (form.vehicles || []).includes(v);
              return (
                <div key={v} onClick={() => setForm(f => ({
                  ...f,
                  vehicles: sel ? (f.vehicles || []).filter(x => x !== v) : [...(f.vehicles || []), v]
                }))} style={{
                  padding: "10px 20px", borderRadius: 8, cursor: "pointer", fontWeight: 700, fontSize: 14,
                  border: `2px solid ${sel ? "var(--red)" : "var(--border)"}`,
                  background: sel ? "#FFF0EF" : "var(--surface)", color: sel ? "var(--red)" : "var(--muted)",
                  display: "flex", alignItems: "center", gap: 8, transition: "all 0.15s",
                }}>
                  <span style={{
                    width: 16, height: 16, borderRadius: 3, flexShrink: 0,
                    border: `2px solid ${sel ? "var(--red)" : "#CCC"}`,
                    background: sel ? "var(--red)" : "#fff",
                    display: "inline-flex", alignItems: "center", justifyContent: "center",
                    color: "#fff", fontSize: 10,
                  }}>{sel ? "✓" : ""}</span>
                  🚒 {v}
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 20 }}>
            <button onClick={() => {
              if (!form.date || !form.keyword) return;
              if (!form.vehicles || form.vehicles.length === 0) return;
              if (form.commander && !(form.selectedMembers || []).includes(form.commander)) {
                setForm(f => ({ ...f, selectedMembers: [...(f.selectedMembers || []), f.commander] }));
              }
              setModal({ type: "mission", step: 2 });
            }} style={{ ...S.btnPrimary, flex: 1, justifyContent: "center" }}>Weiter →</button>
            <button onClick={() => setModal(null)} style={{ ...S.btnSecondary, flex: 1, justifyContent: "center" }}>Abbrechen</button>
          </div>
        </Overlay>
      )}

      {/* ── Modal: Einsatz (Schritt 2) – Teilnehmer auswählen ── */}
      {modal?.type === "mission" && modal.step === 2 && (
        <Overlay onClose={() => setModal(null)} wide>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <button onClick={() => setModal({ type: "mission" })} style={{ ...S.btnSmall }}>← Zurück</button>
            <div style={{ fontFamily: "var(--font-head)", fontSize: 18, fontWeight: 800 }}>Schritt 2/3 – Teilnehmer</div>
          </div>
          <div style={{ color: "var(--muted)", fontSize: 13, marginBottom: 12 }}>
            Wer war beim Einsatz? <strong style={{ color: "var(--red)" }}>{(form.selectedMembers || []).length}</strong> ausgewählt
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: "52vh", overflowY: "auto", paddingRight: 4 }}>
            {activeOnlyMembers.map(m => {
              const checked = (form.selectedMembers || []).includes(m.id);
              return (
                <div key={m.id} onClick={() => setForm(f => ({
                  ...f,
                  selectedMembers: checked
                    ? (f.selectedMembers || []).filter(id => id !== m.id)
                    : [...(f.selectedMembers || []), m.id]
                }))} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "9px 12px",
                  borderRadius: 8, cursor: "pointer",
                  background: checked ? "#FFF0EF" : "#FAFAF8",
                  border: `1.5px solid ${checked ? "var(--red)" : "var(--border)"}`,
                }}>
                  <div style={{
                    width: 20, height: 20, borderRadius: 5, flexShrink: 0,
                    border: `2px solid ${checked ? "var(--red)" : "#CCC"}`,
                    background: checked ? "var(--red)" : "#fff",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "#fff", fontSize: 12,
                  }}>{checked ? "✓" : ""}</div>
                  <span style={{ fontSize: 14, fontWeight: checked ? 600 : 400 }}>{displayName(m.name)}</span>
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={() => {
              if (!(form.selectedMembers || []).length) return;
              setModal({ type: "mission", step: 3 });
            }} style={{ ...S.btnPrimary, flex: 1, justifyContent: "center" }}>Weiter → Sitzplan</button>
            <button onClick={() => setModal(null)} style={{ ...S.btnSecondary, flex: 1, justifyContent: "center" }}>Abbrechen</button>
          </div>
        </Overlay>
      )}

      {/* ── Modal: Einsatz (Schritt 3) – Drag & Drop Sitzplan ── */}
      {modal?.type === "mission" && modal.step === 3 && (() => {
        // Exact layouts from PowerPoint, each row is an array of slot-ids (null = empty spacer)
        const SLOT_DEFS = {
          HLF10: {
            color: "#3B82F6",
            slots: {
              MA:  { role: "Maschinist",    color: "#FECACA" },
              GF:  { role: "Gruppenführer", color: "#FCA5A5" },
              ATF: { role: "Angriffstrupp", color: "#FEF3C7" },
              ME:  { role: "Melder",        color: "#E5E7EB" },
              ATM: { role: "Angriffstrupp", color: "#FEF3C7" },
              STF: { role: "Schlauchtrupp", color: "#DBEAFE" },
              WTF: { role: "Wassertrupp",   color: "#DBEAFE" },
              WTM: { role: "Wassertrupp",   color: "#DBEAFE" },
              STM: { role: "Schlauchtrupp", color: "#DBEAFE" },
            },
            // Each row: array of slotId or null (spacer)
            rows: [
              ["MA", null, "GF"],
              ["ATF", "ME", "ATM"],
              ["STF", "WTF", "WTM", "STM"],
            ],
          },
          TSF: {
            color: "#CA8A04",
            slots: {
              MA:  { role: "Maschinist",    color: "#FECACA" },
              GF:  { role: "Gruppenführer", color: "#FCA5A5" },
              ATF: { role: "Angriffstrupp", color: "#FEF3C7" },
              WTF: { role: "Wassertrupp",   color: "#DBEAFE" },
              WTM: { role: "Wassertrupp",   color: "#DBEAFE" },
              ATM: { role: "Angriffstrupp", color: "#FEF3C7" },
            },
            rows: [
              ["MA", null, "GF"],
              [null, null, null],
              ["ATF", "WTF", "WTM", "ATM"],
            ],
          },
          MTF: {
            color: "#16A34A",
            slots: {
              MA:  { role: "Maschinist",    color: "#FECACA" },
              GF:  { role: "Gruppenführer", color: "#FCA5A5" },
              TM1: { role: "Truppmann 1",   color: "#FEF9C3" },
              TM2: { role: "Truppmann 2",   color: "#FEF9C3" },
              TM3: { role: "Truppmann 3",   color: "#FEF9C3" },
              TM4: { role: "Truppmann 4",   color: "#FEF9C3" },
              TM5: { role: "Truppmann 5",   color: "#FEF9C3" },
              TM6: { role: "Truppmann 6",   color: "#FEF9C3" },
            },
            rows: [
              ["MA", null, "GF"],
              ["TM1", "TM2", "TM3"],
              ["TM4", "TM5", "TM6"],
            ],
          },
        };

        const VCOLORS = { HLF10: "#3B82F6", TSF: "#CA8A04", MTF: "#16A34A" };
        const vehicles = form.vehicles || [];
        const selectedMembers = form.selectedMembers || [];
        const slots = form.slotAssign || {};
        const assignedIds = new Set(Object.values(slots).filter(Boolean));
        const unassigned = selectedMembers.filter(id => !assignedIds.has(id));

        const setSlot = (key, memberId) => {
          setForm(f => {
            const s = { ...f.slotAssign };
            Object.keys(s).forEach(k => { if (s[k] === memberId) delete s[k]; });
            if (memberId) s[key] = memberId; else delete s[key];
            return { ...f, slotAssign: s };
          });
        };

        const allSlotIds = vehicles.flatMap(v => Object.keys((SLOT_DEFS[v] || {}).slots || {}));
        const totalSlots = allSlotIds.length;
        const filled = Object.values(slots).filter(Boolean).length;

        // Layout: first 2 vehicles side by side, third below full width
        const vRow1 = vehicles.slice(0, 2);
        const vRow2 = vehicles.slice(2);

        const SlotBox = ({ vehicle, slotId }) => {
          const def = SLOT_DEFS[vehicle];
          const vc = def ? def.color : "#888";
          const slotMeta = def ? def.slots[slotId] : null;
          const key = `${vehicle}::${slotId}`;
          const occupantId = slots[key];
          const occupant = occupantId ? data.members.find(x => x.id === occupantId) : null;
          return (
            <div
              onDragOver={e => e.preventDefault()}
              onDrop={e => { e.preventDefault(); const mid = e.dataTransfer.getData("memberId"); if (mid) setSlot(key, mid); }}
              style={{
                flex: 1, minHeight: 58, borderRadius: 7,
                border: `2px ${occupant ? "solid" : "dashed"} ${occupant ? vc : "#CCC"}`,
                background: occupant ? (slotMeta ? slotMeta.color : "#FEF3C7") : "#fff",
                display: "flex", flexDirection: "column", alignItems: "center",
                justifyContent: "center", padding: 4, textAlign: "center", position: "relative",
              }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: "#555", marginBottom: 1 }}>{slotId}:</div>
              {occupant ? (
                <>
                  <div draggable onDragStart={e => { e.stopPropagation(); e.dataTransfer.setData("memberId", occupantId); }}
                    style={{ fontSize: 10, fontWeight: 600, cursor: "grab", lineHeight: 1.3, color: "#111" }}>
                    {displayName(occupant.name).split(" ").map((w, i) => <div key={i}>{w}</div>)}
                  </div>
                  <div onClick={() => setSlot(key, null)}
                    style={{ position: "absolute", top: 2, right: 4, fontSize: 10, cursor: "pointer", color: "#AAA" }}>✕</div>
                </>
              ) : (
                <div style={{ fontSize: 9, color: "#CCC" }}>ablegen</div>
              )}
            </div>
          );
        };

        const Spacer = () => <div style={{ flex: 1 }} />;

        const VehicleBlock = ({ vehicle }) => {
          const def = SLOT_DEFS[vehicle];
          if (!def) return null;
          const vc = def.color;
          return (
            <div style={{ border: `2px solid ${vc}`, borderRadius: 10, overflow: "hidden", flex: 1, minWidth: 0 }}>
              <div style={{ background: vc, color: "#fff", padding: "5px 12px", fontWeight: 700, fontSize: 13, textAlign: "center" }}>
                🚒 {vehicle}
              </div>
              <div style={{ padding: "8px", background: "#FAFAFA", display: "flex", flexDirection: "column", gap: 5 }}>
                {def.rows.map((row, ri) => (
                  <div key={ri} style={{ display: "flex", gap: 5 }}>
                    {row.map((slotId, ci) =>
                      slotId
                        ? <SlotBox key={slotId} vehicle={vehicle} slotId={slotId} />
                        : <Spacer key={`sp-${ci}`} />
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        };

        return (
          <Overlay onClose={() => setModal(null)} extraWide>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
              <button onClick={() => setModal({ type: "mission", step: 2 })} style={{ ...S.btnSmall }}>← Zurück</button>
              <div style={{ fontFamily: "var(--font-head)", fontSize: 18, fontWeight: 800 }}>Schritt 3/3 – Sitzplan</div>
              <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--muted)" }}>{filled}/{totalSlots} belegt</span>
            </div>

            {/* Verfügbare Mitglieder */}
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 5 }}>
                Verfügbar ({unassigned.length})
              </div>
              <div
                onDragOver={e => e.preventDefault()}
                onDrop={e => {
                  e.preventDefault();
                  const mid = e.dataTransfer.getData("memberId");
                  if (mid) setForm(f => {
                    const s = { ...f.slotAssign };
                    Object.keys(s).forEach(k => { if (s[k] === mid) delete s[k]; });
                    return { ...f, slotAssign: s };
                  });
                }}
                style={{ display: "flex", flexWrap: "wrap", gap: 5, minHeight: 36, padding: "6px 8px", background: "#F5F5F3", borderRadius: 8, border: "1.5px dashed #CCC" }}>
                {unassigned.map(id => {
                  const m = data.members.find(x => x.id === id);
                  if (!m) return null;
                  return (
                    <div key={id}
                      draggable
                      onDragStart={e => {
                        e.stopPropagation();
                        e.dataTransfer.setData("memberId", id);
                      }}
                      style={{ padding: "3px 9px", borderRadius: 5, background: "#fff", border: "1.5px solid var(--red)", fontSize: 12, fontWeight: 600, cursor: "grab", color: "var(--red)", userSelect: "none" }}>
                      {displayName(m.name)}
                    </div>
                  );
                })}
                {unassigned.length === 0 && <span style={{ fontSize: 11, color: "#AAA", alignSelf: "center" }}>Alle zugewiesen ✓</span>}
              </div>
            </div>

            {/* Fahrzeuge: erste 2 nebeneinander, Rest darunter */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {vRow1.length > 0 && (
                <div style={{ display: "flex", gap: 8 }}>
                  {vRow1.map(v => <VehicleBlock key={v} vehicle={v} />)}
                </div>
              )}
              {vRow2.length > 0 && (
                <div style={{ display: "flex", gap: 8 }}>
                  {vRow2.map(v => <VehicleBlock key={v} vehicle={v} />)}
                </div>
              )}
            </div>

            <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
              <button onClick={() => {
                if (!form.date || !form.keyword || !form.timeFrom || !form.timeTo) return;
                const [fh, fm] = form.timeFrom.split(":").map(Number);
                const [th, tm] = form.timeTo.split(":").map(Number);
                let hours = ((th * 60 + tm) - (fh * 60 + fm)) / 60;
                if (hours <= 0) hours += 24;
                hours = Math.round(hours * 100) / 100;
                const assignments = {};
                Object.entries(slots).forEach(([key, mid]) => {
                  if (!mid) return;
                  const [vehicle, slotId] = key.split("::");
                  const slotMeta = (SLOT_DEFS[vehicle] || {}).slots?.[slotId];
                  if (!assignments[vehicle]) assignments[vehicle] = {};
                  assignments[vehicle][mid] = slotMeta ? slotMeta.role : slotId;
                });
                const ms = {
                  id: generateId(),
                  date: form.date, number: form.number || "", title: form.keyword,
                  keyword: form.keyword || "", location: form.location || "",
                  commander: form.commander || "", vehicles: form.vehicles || [],
                  assignments, attendees: selectedMembers, slotAssign: slots, report: form.report || "",
                  hours, timeFrom: form.timeFrom, timeTo: form.timeTo,
                  createdAt: Date.now(),
                };
                setData(d => ({ ...d, missions: [...(d.missions || []), ms].sort((a, b) => b.date.localeCompare(a.date)) }));
                sendMissionMail(ms, data.members);
                setModal(null); setForm({});
              }} style={{ ...S.btnPrimary, flex: 1, justifyContent: "center" }}>💾 Speichern</button>
              <button onClick={() => setModal(null)} style={{ ...S.btnSecondary, flex: 1, justifyContent: "center" }}>Abbrechen</button>
            </div>
          </Overlay>
        );
      })()}

      {/* ── Modal: Einsatz Anwesenheit ── */}
      {modal?.type === "missionAttendance" && (() => {
        const ms = (data.missions || []).find(m => m.id === modal.missionId);
        if (!ms) return null;
        const isLocked = !isAdmin;
        const commander = ms.commander ? data.members.find(m => m.id === ms.commander) : null;
        const VCOLORS_ATT = { HLF10: "#3B82F6", TSF: "#CA8A04", MTF: "#16A34A" };
        const vList = Array.isArray(ms.vehicles) && ms.vehicles.length > 0 ? ms.vehicles : [];
        const vRow1 = vList.slice(0, 2);
        const vRow2 = vList.slice(2);
        const assignedToVehicle = new Set(
          vList.flatMap(v => Object.keys((ms.assignments || {})[v] || {}))
        );
        const reserveMembers = (ms.attendees || []).filter(id => !assignedToVehicle.has(id));
        return (
          <Overlay onClose={() => setModal(null)} extraWide>
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontFamily: "var(--font-head)", fontSize: 20, fontWeight: 800, letterSpacing: "0.02em" }}>
                {ms.number && <span style={{ color: "var(--muted)", fontWeight: 500, marginRight: 6 }}>#{ms.number}</span>}
                {ms.title}
              </div>
              <div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4, display: "flex", gap: 12, flexWrap: "wrap" }}>
                <span>📅 {formatDate(ms.date)}</span>
                {ms.timeFrom && ms.timeTo && <span>⏱ {ms.timeFrom}–{ms.timeTo} ({ms.hours}h)</span>}
                {ms.keyword && <span>🔖 {ms.keyword}</span>}
                {ms.location && <span>📍 {ms.location}</span>}
                {commander && <span>👤 {displayName(commander.name)}</span>}
                {vList.length > 0 && <span>🚒 {vList.join(", ")}</span>}
              </div>
            </div>
            {isLocked && (
              <div style={{ background: "#FFF7ED", border: "1px solid #FED7AA", borderRadius: 8, padding: "10px 14px", marginBottom: 12, fontSize: 13, color: "#92400E", fontWeight: 500 }}>
                🔒 Nur Admins können Teilnehmer eines Einsatzes ändern.
              </div>
            )}
            <div style={{ background: "var(--bg)", borderRadius: 8, padding: "8px 14px", marginBottom: 12, fontSize: 13 }}>
              <span style={{ fontWeight: 700, color: "var(--red)", fontSize: 16 }}>{ms.attendees.length}</span>
              <span style={{ color: "var(--muted)", marginLeft: 4 }}>/ {data.members.length} Personen</span>
            </div>

            {ms.report && (
              <div style={{ background: "#F8F8F6", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 14px", marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 5 }}>📋 Einsatzkurzbericht</div>
                <div style={{ fontSize: 13, whiteSpace: "pre-wrap", lineHeight: 1.6 }}>{ms.report}</div>
              </div>
            )}

            {vList.length > 0 ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[vRow1, vRow2].filter(row => row.length > 0).map((row, ri) => (
                  <div key={ri} style={{ display: "flex", gap: 8 }}>
                    {row.map(vehicle => {
                      const vc = VCOLORS_ATT[vehicle] || "var(--red)";
                      const entries = Object.entries((ms.assignments || {})[vehicle] || {});
                      return (
                        <div key={vehicle} style={{ flex: 1, border: `2px solid ${vc}`, borderRadius: 10, overflow: "hidden" }}>
                          <div style={{ background: vc, color: "#fff", padding: "6px 14px", fontWeight: 700, fontSize: 14 }}>
                            🚒 {vehicle}
                          </div>
                          <div style={{ padding: "8px 10px", display: "flex", flexDirection: "column", gap: 4 }}>
                            {entries.length > 0 ? entries.map(([memberId, role]) => {
                              const m = data.members.find(x => x.id === memberId);
                              if (!m) return null;
                              return (
                                <div key={memberId} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 8px", background: "#FAFAF8", borderRadius: 6, border: "1px solid var(--border)" }}>
                                  <span style={{ flex: 1, fontWeight: 600, fontSize: 13 }}>{displayName(m.name)}</span>
                                  <span style={{ fontSize: 11, color: "var(--muted)", background: "var(--bg)", padding: "2px 7px", borderRadius: 5 }}>{role}</span>
                                </div>
                              );
                            }) : (
                              <div style={{ color: "var(--muted)", fontSize: 13, padding: "4px 0" }}>Keine Besatzung eingetragen</div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}

                {/* Reserve */}
                {reserveMembers.length > 0 && (
                  <div style={{ border: "2px solid #6B7280", borderRadius: 10, overflow: "hidden" }}>
                    <div style={{ background: "#6B7280", color: "#fff", padding: "6px 14px", fontWeight: 700, fontSize: 14 }}>
                      📋 Reserve
                    </div>
                    <div style={{ padding: "8px 10px", display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {reserveMembers.map(id => {
                        const m = data.members.find(x => x.id === id);
                        if (!m) return null;
                        return (
                          <div key={id} style={{ padding: "4px 12px", background: "#F3F4F6", borderRadius: 6, border: "1px solid #D1D5DB", fontSize: 13, fontWeight: 600, color: "#374151" }}>
                            {displayName(m.name)}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 5, maxHeight: 340, overflowY: "auto", paddingRight: 4 }}>
                {activeOnlyMembers.map(m => {
                  const checked = ms.attendees.includes(m.id);
                  return (
                    <div key={m.id}
                      onClick={() => !isLocked && toggleMissionAttendee(ms.id, m.id)}
                      style={{
                        display: "flex", alignItems: "center", gap: 12, padding: "10px 12px",
                        borderRadius: 8, cursor: isLocked ? "default" : "pointer",
                        background: checked ? "#FFF0EF" : "#FAFAF8",
                        border: `1.5px solid ${checked ? "var(--red)" : "var(--border)"}`,
                        opacity: isLocked ? 0.7 : 1,
                      }}>
                      <div style={{
                        width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                        border: `2px solid ${checked ? "var(--red)" : "#CCC"}`,
                        background: checked ? "var(--red)" : "#fff",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        color: "#fff", fontSize: 13,
                      }}>{checked && "✓"}</div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{displayName(m.name)}</div>
                    </div>
                  );
                })}
              </div>
            )}
            <button onClick={() => setModal(null)} style={{ ...S.btnPrimary, marginTop: 16, width: "100%", justifyContent: "center" }}>
              Fertig
            </button>
          </Overlay>
        );
      })()}

      {/* ── Modal: Anwesenheit ── */}
      {modal?.type === "attendance" && attEvent && (() => {
        const isLocked = attEvent.createdAt && (Date.now() - attEvent.createdAt) > 3 * 60 * 60 * 1000;
        return (
        <Overlay onClose={() => setModal(null)} wide>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: "var(--font-head)", fontSize: 20, fontWeight: 800, letterSpacing: "0.02em" }}>{attEvent.title}</div>
            <div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4, display: "flex", gap: 12, flexWrap: "wrap" }}>
              <span>📅 {formatDate(attEvent.date)}</span>
              {attEvent.timeFrom && attEvent.timeTo && <span>⏱ {attEvent.timeFrom}–{attEvent.timeTo}{isAdmin ? ` (${attEvent.hours}h)` : ""}</span>}
              {attEvent.responsible && (() => {
                const m = data.members.find(m => m.id === attEvent.responsible);
                return m ? <span>👤 {m.name}</span> : null;
              })()}
              <span style={{
                background: TYPE_META[attEvent.type].bg, color: TYPE_META[attEvent.type].color,
                padding: "1px 8px", borderRadius: 5, fontSize: 12, fontWeight: 700,
              }}>{TYPE_META[attEvent.type].label}</span>
            </div>
          </div>

          {isLocked && (
            <div style={{
              background: "#FFF7ED", border: "1px solid #FED7AA", borderRadius: 8,
              padding: "10px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 8,
              fontSize: 13, color: "#92400E", fontWeight: 500,
            }}>
              🔒 Bearbeitungsfrist abgelaufen – Teilnehmer können nicht mehr geändert werden.
            </div>
          )}

          {data.members.length === 0 && <div style={S.empty}>Keine Mitglieder vorhanden.</div>}

          {/* Quick stats bar */}
          {data.members.length > 0 && (
            <div style={{ background: "var(--bg)", borderRadius: 8, padding: "10px 14px", marginBottom: 12, display: "flex", gap: 20 }}>
              <div style={{ fontSize: 13 }}>
                <span style={{ fontWeight: 700, color: "var(--red)", fontSize: 16 }}>{attEvent.attendees.length}</span>
                <span style={{ color: "var(--muted)", marginLeft: 4 }}>/ {data.members.length} Personen</span>
              </div>
{isAdmin && (
              <div style={{ fontSize: 13 }}>
                <span style={{ fontWeight: 700, color: "var(--red)", fontSize: 16 }}>{(attEvent.attendees.length * attEvent.hours).toFixed(1)}h</span>
                <span style={{ color: "var(--muted)", marginLeft: 4 }}>Gesamtstunden</span>
              </div>
            )}
            </div>
          )}

          {attEvent.guests && (
            <div style={{ background: "#F0FDF4", border: "1px solid #86EFAC", borderRadius: 8, padding: "10px 14px", marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#166534", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>👥 Gäste</div>
              <div style={{ fontSize: 13, color: "#166534", whiteSpace: "pre-wrap" }}>{attEvent.guests}</div>
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 5, maxHeight: 340, overflowY: "auto", paddingRight: 4 }}>
            {sortedMembers.map(m => {
              const checked = attEvent.attendees.includes(m.id);
              return (
                <div
                  key={m.id}
                  onClick={() => !isLocked && toggleAttendee(attEvent.id, m.id)}
                  style={{
                    display: "flex", alignItems: "center", gap: 12, padding: "10px 12px",
                    borderRadius: 8, cursor: isLocked ? "default" : "pointer", transition: "all 0.12s",
                    background: checked ? "#FFF0EF" : "#FAFAF8",
                    border: `1.5px solid ${checked ? "var(--red)" : "var(--border)"}`,
                    opacity: isLocked ? 0.7 : 1,
                  }}
                >
                  <div style={{
                    width: 22, height: 22, borderRadius: 6,
                    border: `2px solid ${checked ? "var(--red)" : "#CCC"}`,
                    background: checked ? "var(--red)" : "#fff",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "#fff", fontSize: 13, flexShrink: 0, transition: "all 0.12s",
                  }}>
                    {checked && "✓"}
                  </div>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{m.name}</div>
  
                  </div>
                </div>
              );
            })}
          </div>

          <button onClick={() => setModal(null)} style={{ ...S.btnPrimary, marginTop: 16, width: "100%", justifyContent: "center" }}>
            Fertig
          </button>
        </Overlay>
        );
      })()}
      {/* ── Toast ── */}
      {mailToast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: mailToast.ok ? "#166534" : "#991B1B",
          color: "#fff", padding: "12px 24px", borderRadius: 10,
          fontWeight: 600, fontSize: 14, boxShadow: "var(--shadow-lg)",
          zIndex: 200, animation: "fadeIn 0.2s ease both",
        }}>
          {mailToast.msg}
        </div>
      )}

    </div>
  );
}

function ModalTitle({ children }) {
  return (
    <div style={{ fontFamily: "var(--font-head)", fontSize: 20, fontWeight: 800, letterSpacing: "0.02em", marginBottom: 4 }}>
      {children}
    </div>
  );
}

function Overlay({ children, onClose, wide, extraWide }) {
  return (
    <div
      style={{
        position: "fixed", inset: 0, background: "rgba(10,8,6,0.6)",
        display: "flex", alignItems: "center", justifyContent: "center",
        zIndex: 100, padding: 16, backdropFilter: "blur(2px)",
      }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div style={{
        background: "#fff", borderRadius: 16, padding: 28,
        width: "100%", maxWidth: extraWide ? 860 : wide ? 500 : 420,
        maxHeight: "95vh", overflowY: "auto",
        boxShadow: "var(--shadow-lg)", animation: "slideUp 0.2s ease both",
      }}>
        {children}
      </div>
    </div>
  );
}


function Clock() {
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const pad = n => String(n).padStart(2, "0");
  const date = now.toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "2-digit", year: "numeric" });
  const time = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  return (
    <div style={{
      background: "rgba(255,255,255,0.15)", borderRadius: 8, padding: "6px 14px",
      textAlign: "center", minWidth: 140,
    }}>
      <div style={{ fontFamily: "var(--font-head)", fontSize: 18, fontWeight: 700, color: "#fff", lineHeight: 1, letterSpacing: "0.04em" }}>{time}</div>
      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.8)", fontWeight: 500, marginTop: 2 }}>{date}</div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
